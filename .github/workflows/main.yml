name: Build workflow
on:
  push:
    branches:
        - main
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v4

            - name: build
              run: mvn install
    
    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: code checkout
              uses: actions/checkout@v4
            
            - name: Test
              run: mvn test
            - name: Checkstyle
              run: mvn checkstyle:checkstyle

