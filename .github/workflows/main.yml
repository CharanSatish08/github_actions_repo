name: Build workflow
on:
  push:
    branches:
        - main

  workflow_dispatch:

permissions:
  contents: read

env:
    ECR_REPOSITORY: 'github-project'

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: build
              run: mvn install

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                name: vprofile-app
                path: target/*.war
            
            - name: Notify if build fails
              if: failure()
              run: echo "Build failed! Please check the logs for details."
    
    
    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: code checkout
              uses: actions/checkout@v4
            
            - name: Run Tests on main branch
              if: github.ref == 'refs/heads/main'
              run: mvn test

            - name: Checkstyle
              if: github.ref == 'refs/heads/main'
              run: mvn checkstyle:checkstyle

            - name: skip tests on other branches
              if: github.ref != 'refs/heads/main'
              run: echo "Tests are skipped for non-main branches."
            
    Security-scan:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: code checkout
              uses: actions/checkout@v4
 
            - name: Manual Trivy Setup
              uses: aquasecurity/setup-trivy@v0.2.0
              with:
                cache: true
                version: v0.69.3

            - name: Scan filesystem
              run: trivy fs --exit-code 0 --format json --vuln-type os,library --output trivy-results.json .

            - name: Upload Trivy scan results as artifact
              uses: actions/upload-artifact@v4
              with:
                name: trivy-scan-results
                path: trivy-results.json

    Build_and_Publish:
        name: Build and publish
        runs-on: ubuntu-latest
        needs: [build, test, Security-scan]
        environment: Prod
        if: github.ref == 'refs/heads/main'
        steps:
            - name: code checkout
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v1
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{vars.REGION}}
            
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v1

            - name: Build, tag and push the image
              id: build-image
              env:
                ECR_REGISTRY: ${{steps.login-ecr.outputs.registry}}
                IMAGE_TAG: ${{ github.sha }}
              run: 
                docker build -f Docker-files/app/multistage/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
                docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                

